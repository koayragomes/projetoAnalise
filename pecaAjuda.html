<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            background-color: rgb(153, 215, 245);

        }

        .card {
            background-color: #2e86c1;
            border-radius: 16px;
            padding: 30px 36px;
            width: 100%;
            height: 500px;
            margin-left: 750px;
            max-width: 450px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
            margin-top: 40px;

        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .campo {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
        }

        .campo label {
            color: #ffffff;
            font-size: 0.95rem;
            min-width: 75px;
            text-align: left;
        }

        .campo input[type="text"],
        .campo select,
        .campo textarea {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: rgb(14, 61, 161);
            color: #ffffff;
            outline: none;
            font-family: Arial, sans-serif;
        }

        .campo input[type="text"]::placeholder {
            color: #a0c8e8;
        }

        .campo input[type="text"]:focus,
        .campo select:focus,
        .campo textarea:focus {
            box-shadow: 0 0 0 2px #ffffff;
        }

        .campo select option {
            background-color: rgb(14, 61, 161);
            color: #ffffff;
        }

        .campo textarea {
            resize: vertical;
            height: 90px;
        }

        .btn-enviar {
            display: flex;
            justify-content: center;
            margin-top: 60px;
        }

        .btn-enviar button {
            padding: 10px 40px;
            background-color: rgb(14, 61, 161);
            color: #ffffff;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-enviar button:hover {
            background-color: rgb(6, 22, 57);
        }

        .resumo {
            margin-top: 20px;
            background-color: rgb(14, 61, 161);
            border-radius: 8px;
            padding: 16px;
            display: none;
        }

        .resumo h2 {
            color: #ffffff;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .resumo p {
            color: #d6eaf8;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .titulo {
            color: rgb(28, 28, 171);
            font-size: 30px;
            font-style: normal;
            display: flex;
            align-items: center;

        }

        .barra {

            background-color: rgb(14, 61, 161);
            border-radius: 13px;
            padding: 10px;
            display: flex;
            gap: 8px;
            justify-content: space-between;


        }

        a {
            color: aliceblue;
            font-size: large;
            text-decoration: none;
            transition: 0.4s;
        }

        a:hover {
            color: rgb(82, 174, 255);
            font-size: large;
            text-decoration: none;
        }

        p {
            color: aliceblue;
            font-size: larger;
        }

        .titulo img {
            width: 150px;
            height: 150px;
        }

        .titulo h1 {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 100;
        }

        h1 {
            margin-top: 10px;
        }

        .rodape {
            background-color: #074a7a98;
            color: rgb(107, 203, 247);
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .cartao {
            display: flex;
            align-items: center;
            justify-content: space-between;

        }
    </style>
</head>

<body>

    <div class="titulo">
        <img src="assets/sitemulher.png">
        <h1>Portal de Apoio <br> á Mulher</h1>
    </div>

    <div class="barra">
        <a href="index.html" target="_blank">Página Inicial</a>
        <a href="Localizacao.html" target="_blank">Localizações</a>
        <a href="pecaAjuda.html" target="_blank">Peça Ajuda</a>
    </div>

    <div class="cartao">

        <div class="card">
            <h2>Preencha seus Dados</h2>

            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="" />
            </div>

            <div class="campo">
                <label for="contato">Contato:</label>
                <input type="text" id="contato" placeholder="" />
            </div>

            <div class="campo">
                <label for="cidade">Cidade:</label>
                <select id="cidade">
                    <option value="">Selecione</option>
                    <option value="Marabá">Marabá</option>
                    <option value="Belém">Belém</option>
                    <option value="Santarém">Santarém</option>
                    <option value="Ananindeua">Ananindeua</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="campo">
                <label for="situacao">Situação:</label>
                <textarea id="situacao"></textarea>
            </div>

            <div class="btn-enviar">
                <button type="button" onclick="enviar()">Enviar</button>
            </div>

            <div class="resumo" id="resumo">
                <h2>Resumo:</h2>
                <p id="texto-resumo"></p>
            </div>
        </div>

    </div>

    <script>
        function enviar() {
            const nome = document.getElementById('nome').value.trim();
            const contato = document.getElementById('contato').value.trim();
            const cidade = document.getElementById('cidade').value;
            const situacao = document.getElementById('situacao').value.trim();

            if (!nome || !contato || !cidade) {
                alert('Por favor, preencha Nome, Contato e Cidade.');
                return;
            }

            document.getElementById('texto-resumo').innerHTML =
                `Nome: ${nome}<br>` +
                `Contato: ${contato}<br>` +
                `Cidade: ${cidade}<br>` +
                `Situação: ${situacao}`;

            document.getElementById('resumo').style.display = 'block';
        }
    </script>

    <footer class="rodape">
        <p>&copy; 2026 Meu Site. Todos os direitos reservados.</p>
        <ul>
            <li><a href="#">Política de Privacidade</a></li>
            <li><a href="#">Termos de Uso</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </footer>

</body>

</html>

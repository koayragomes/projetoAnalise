    <style>

        }

        p {
            color: aliceblue;
            font-size: larger;
        }

        .titulo img {
            width: 150px;
            height: 150px;
        }

        .titulo h1 {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 100;
        }

        h2 {
            font-size: large;
        }

        h1 {
            margin-top: 10px;
        }

        .rodape {
            background-color: #074a7a98;
            color: rgb(107, 203, 247);
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>

</head>
